repos:
  # ── General file hygiene ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace       # removes trailing spaces
      - id: end-of-file-fixer         # ensures files end with a newline
      - id: check-yaml                # validates yaml syntax (your CI files)
      - id: check-toml                # validates Cargo.toml syntax
      - id: check-merge-conflict      # blocks accidental merge conflict markers
      - id: check-added-large-files   # warns if you accidentally commit a binary
        args: ['--maxkb=500']

  # ── Rust ──────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: fmt
        name: cargo fmt
        description: enforce rustfmt formatting
        language: system
        entry: cargo fmt --
        args: ['--check']
        types: [rust]
        pass_filenames: false
        # mirrors: cargo fmt --check in CI

      - id: clippy
        name: cargo clippy
        description: run clippy lints
        language: system
        entry: cargo clippy
        args: ['--all-features', '--', '-D', 'warnings']
        types: [rust]
        pass_filenames: false
        # mirrors: cargo clippy -- -D warnings in CI

      - id: test
        name: cargo test
        description: run the test suite
        language: system
        entry: cargo test
        args: ['--all-features']
        types: [rust]
        pass_filenames: false
        # mirrors: cargo test --all-features in CI

      # optional — only runs on Cargo.lock changes
      - id: cargo-lock
        name: cargo check
        description: ensure project compiles after dependency changes
        language: system
        entry: cargo check
        args: ['--all-features']
        types: [rust]
        pass_filenames: false
